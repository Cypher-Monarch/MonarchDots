animations {
    enabled = true

    # Clean, no-overshoot curves
    bezier = smoothOut, 0.2, 0.8, 0.2, 1
    bezier = smooth,    0.25, 0.1, 0.25, 1
    bezier = sharp,     0.4, 0, 0.6, 1
    bezier = linear,    1, 1, 1, 1

    # Global
    animation = global, 1, 4, smooth

    # Windows (your hard constraint)
    animation = windows,     1, 3, smoothOut, popin 92%
    animation = windowsIn,   1, 3, smoothOut
    animation = windowsOut,  1, 2, smoothOut
    animation = windowsMove, 1, 3, smooth

    # Layers
    animation = layers,      1, 4, smooth, slidefade 12%
    animation = layersIn,    1, 4, smoothOut
    animation = layersOut,   1, 3, smooth

    # Fade (must be slightly slower relative or it flickers)
    animation = fade,         1, 4, sharp
    animation = fadeIn,       1, 4, sharp
    animation = fadeOut,      1, 4, sharp
    animation = fadeSwitch,   1, 3, sharp
    animation = fadeShadow,   1, 3, sharp
    animation = fadeDim,      1, 4, sharp
    animation = fadeLayers,   1, 4, sharp
    animation = fadeLayersIn, 1, 4, sharp
    animation = fadeLayersOut,1, 4, sharp

    # Borders (basically instant)
    animation = border,      1, 2, linear
    animation = borderangle, 1, 20, linear, loop

    # Workspaces (critical for feel)
    animation = workspaces,    1, 5, smooth, slidefade 18%
    animation = workspacesIn,  1, 5, smoothOut
    animation = workspacesOut, 1, 4, smooth

    # Special workspaces
    animation = specialWorkspace,    1, 5, smooth
    animation = specialWorkspaceIn,  1, 5, smoothOut
    animation = specialWorkspaceOut, 1, 4, smooth
}
